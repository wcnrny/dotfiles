##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrulev2 = opacity 1.0 1.0, class:^(firefox)$
windowrulev2 = opacity 1.0 1.0, class:^(Zen Browser)$
windowrulev2 = opacity 1.0 1.0, class:^(Brave-browser)$
windowrulev2 = opacity 1.0 1.0, class:^(vlc)$
windowrulev2 = opacity 1.0 1.0, class:^(mpv)$
windowrulev2 = opacity 1.0 1.0, class:^(feh)$

windowrulev2 = opacity 0.90 0.90, class:^(kitty)$
windowrulev2 = opacity 0.90 0.90, class:^(code-oss)$
windowrulev2 = opacity 0.90 0.90, class:^(VSCodium)$
windowrulev2 = opacity 0.90 0.90, class:^(Rofi)$

windowrulev2 = opacity 1.0 1.0, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$

windowrulev2 = float, class:^(kitty-float)$
windowrulev2 = size 60% 60%, class:^(kitty-float)$
windowrulev2 = center, class:^(kitty-float)$
windowrulev2 = animation popin, class:^(kitty-float)$

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}


windowrulev2 = float, class:^(kitty-float)$
windowrulev2 = size 60% 60%, class:^(kitty-float)$
windowrulev2 = center, class:^(kitty-float)$
windowrulev2 = animation popin, class:^(kitty-float)$

windowrulev2 = opaque, tag:mat_mod